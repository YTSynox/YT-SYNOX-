<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>synox | Bio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="enter-screen" onclick="startPage()">
        <p class="enter-text">[ GİRMEK İÇİN TIKLA ]</p>
    </div>

    <div id="volume-control" class="volume-container">
        <i id="volume-icon" class="fa-solid fa-volume-high"></i>
        <div class="volume-bar-bg">
            <div id="volume-bar" class="volume-bar-red"></div>
        </div>
    </div>

    <div class="video-background">
        <div id="player"></div>
    </div>

    <div id="main-content">
        <div class="card-container">
            <div class="logo-blur"></div>
            <div class="profile-card">
                <h1 class="main-title">SYNOX</h1>
                <p class="subtitle">BEDAVA SCRIPTLER ICIN KATIL!</p>
                <div class="location"><i class="fa-solid fa-location-dot"></i> Turkey</div>
                
                <div class="status-box">
                    <i class="fa-solid fa-circle-xmark"></i>
                    <span>TRK HUB</span>
                    <p>Join https://discord.gg/7abeVaAsUW to display your status</p>
                </div>

                <div class="social-icons">
                    <a href="https://www.youtube.com/@YtSynox" target="_blank" class="icon-link"><i class="fa-brands fa-youtube"></i></a>
                    <a href="https://discord.gg/7abeVaAsUW" target="_blank" class="icon-link"><i class="fa-brands fa-discord"></i></a>
                </div>
            </div>
        </div>
        <div class="views"><i class="fa-solid fa-eye"></i> 147</div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let isMuted = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: 'MJXHVdWzPks', // Undertale Last Breath
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'loop': 1,
                    'playlist': 'MJXHVdWzPks',
                    'mute': 0
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            event.target.setVolume(50);
        }

        function startPage() {
            document.getElementById('enter-screen').style.display = 'none';
            document.getElementById('main-content').style.opacity = '1';
            document.getElementById('volume-control').style.display = 'flex';
            player.playVideo();
        }

        // Ses Açma/Kapama Fonksiyonu
        document.getElementById('volume-control').onclick = function() {
            if (isMuted) {
                player.unMute();
                document.getElementById('volume-icon').className = "fa-solid fa-volume-high";
                document.getElementById('volume-bar').style.width = "100%";
            } else {
                player.mute();
                document.getElementById('volume-icon').className = "fa-solid fa-volume-xmark";
                document.getElementById('volume-bar').style.width = "0%";
            }
            isMuted = !isMuted;
        };
    </script>
</body>
</html>
